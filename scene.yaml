---
initial_vm_state:
  score: 0
  combo: 0
  missed: 0
pulse:
  bpm: 120
  beatsPerBar: 4
  subdivisions: 4
camera:
  position:
    x: 0
    y: 2
    z: 6
  lookAt:
    x: 0
    y: 1.5
    z: -20
  fov: 70
  enableControls: false
background:
  color: "#0a0a1a"
atmosphere:
  preset: night
  fogColor: "#12122A"
  fogNear: 20
  fogFar: 190
  exposure: 0.92
lights:
- id: ambient
  type: ambient
  color: "#FFFFFF"
  intensity: 0.3
- id: spot
  type: directional
  color: "#FFFFFF"
  intensity: 1.2
  position:
    x: 0
    y: 10
    z: 5
- id: left-neon
  type: point
  color: "#FF4974"
  intensity: 0.7
  position:
    x: -2.2
    y: 2.4
    z: -8
- id: right-neon
  type: point
  color: "#52A7FF"
  intensity: 0.7
  position:
    x: 2.2
    y: 2.4
    z: -8
threeJsLayer:
- id: runway
  context: threejs
  type: box
  position:
    x: 0
    y: -0.1
    z: -20
  size:
    width: 4
    height: 0.05
    depth: 60
  material:
    color: "#111133"
    usePbr: true
    roughness: 0.72
    metalness: 0.25
- id: lane-left
  context: threejs
  type: box
  position:
    x: -1.0
    y: 0.0
    z: -20
  size:
    width: 0.02
    height: 0.02
    depth: 60
  material:
    color: "#333366"
    usePbr: true
    roughness: 0.36
    metalness: 0.52
- id: lane-center
  context: threejs
  type: box
  position:
    x: 0.0
    y: 0.0
    z: -20
  size:
    width: 0.02
    height: 0.02
    depth: 60
  material:
    color: "#333366"
    usePbr: true
    roughness: 0.36
    metalness: 0.52
- id: lane-right
  context: threejs
  type: box
  position:
    x: 1.0
    y: 0.0
    z: -20
  size:
    width: 0.02
    height: 0.02
    depth: 60
  material:
    color: "#333366"
    usePbr: true
    roughness: 0.36
    metalness: 0.52
- id: left-saber
  context: threejs
  type: box
  position:
    x: -0.8
    y: 1.5
    z: 2
  rotation:
    x: -0.3
    y: 0
    z: 0.2
  size:
    width: 0.06
    height: 0.9
    depth: 0.06
  material:
    color: "#FF3344"
    usePbr: true
    roughness: 0.2
    metalness: 0.75
    emissive: "#FF3344"
    emissiveIntensity: 0.9
  physics:
    kinematic: true
    bodyType: kinematic
    bounded: true
    bounce: 0
    bounds:
      minX: -1.35
      maxX: -0.2
      minY: 0.85
      maxY: 2.45
  collision:
    collidable: true
    collisionGroups:
    - saber-left
    collidesWith:
    - blocks-red
    onCollision: register_hit
  actions:
    register_hit:
      stateMutations:
      - path: vm.score
        operation: increment
        value: 100
      - path: vm.combo
        operation: increment
        value: 1
    center:
      transform:
        position:
          x: -0.8
          y: 1.5
          z: 2
    swing_left:
      transform:
        translate:
          x: -0.1
    swing_right:
      transform:
        translate:
          x: 0.1
    swing_up:
      transform:
        translate:
          y: 0.1
    swing_down:
      transform:
        translate:
          y: -0.1
  callbacks:
    onKeyHeld:
      a: swing_left
      d: swing_right
      w: swing_up
      s: swing_down
    onKeyUp:
      a: center
      d: center
      w: center
      s: center
- id: right-saber
  context: threejs
  type: box
  position:
    x: 0.8
    y: 1.5
    z: 2
  rotation:
    x: -0.3
    y: 0
    z: -0.2
  size:
    width: 0.06
    height: 0.9
    depth: 0.06
  material:
    color: "#3399FF"
    usePbr: true
    roughness: 0.2
    metalness: 0.75
    emissive: "#3399FF"
    emissiveIntensity: 0.9
  physics:
    kinematic: true
    bodyType: kinematic
    bounded: true
    bounce: 0
    bounds:
      minX: 0.2
      maxX: 1.35
      minY: 0.85
      maxY: 2.45
  collision:
    collidable: true
    collisionGroups:
    - saber-right
    collidesWith:
    - blocks-blue
    onCollision: register_hit
  actions:
    register_hit:
      stateMutations:
      - path: vm.score
        operation: increment
        value: 100
      - path: vm.combo
        operation: increment
        value: 1
    center:
      transform:
        position:
          x: 0.8
          y: 1.5
          z: 2
    swing_left:
      transform:
        translate:
          x: -0.1
    swing_right:
      transform:
        translate:
          x: 0.1
    swing_up:
      transform:
        translate:
          y: 0.1
    swing_down:
      transform:
        translate:
          y: -0.1
  callbacks:
    onKeyHeld:
      ArrowLeft: swing_left
      ArrowRight: swing_right
      ArrowUp: swing_up
      ArrowDown: swing_down
    onKeyUp:
      ArrowLeft: center
      ArrowRight: center
      ArrowUp: center
      ArrowDown: center
- id: miss-zone
  context: threejs
  type: box
  position:
    x: 0
    y: 1.5
    z: 3.6
  size:
    width: 3.2
    height: 2.6
    depth: 0.15
  visible: false
  physics:
    kinematic: true
    bodyType: static
  collision:
    collidable: true
    collisionGroups:
    - miss-zone
    collidesWith:
    - blocks-red
    - blocks-blue
    onCollision: register_miss
  actions:
    register_miss:
      stateMutations:
      - path: vm.missed
        operation: increment
        value: 1
      - path: vm.combo
        operation: set
        value: 0
- id: spawner
  context: threejs
  type: box
  position:
    x: 0
    y: 1.5
    z: -50
  size:
    width: 0.01
    height: 0.01
    depth: 0.01
  visible: false
  style:
    color: "#000000"
  physics:
    kinematic: true
    bodyType: kinematic
  actions:
    set_lane_low:
      transform:
        position:
          x: 0
          y: 1.05
          z: -50
    set_lane_mid:
      transform:
        position:
          x: 0
          y: 1.5
          z: -50
    set_lane_high:
      transform:
        position:
          x: 0
          y: 1.95
          z: -50
    spawn_red:
      spawn:
        maxActive: 24
        template:
          context: threejs
          type: box
          size:
            width: 0.7
            height: 0.7
            depth: 0.7
          material:
            color: "#FF3344"
            usePbr: true
            roughness: 0.34
            metalness: 0.58
            emissive: "#FF3344"
            emissiveIntensity: 0.5
          physics:
            kinematic: true
            bodyType: dynamic
            vz: 10
            lifetime: 8
            destroyOutOfBounds: true
            bounds:
              minX: -10
              maxX: 10
              minY: -2
              maxY: 10
              minZ: -60
              maxZ: 6
          collision:
            collidable: true
            collisionGroups:
            - blocks-red
            collidesWith:
            - saber-left
            - miss-zone
            onCollision: sliced
          actions:
            sliced:
              destroy: true
        offset:
          x: -0.8
          y: 0
          z: 0
    spawn_blue:
      spawn:
        maxActive: 24
        template:
          context: threejs
          type: box
          size:
            width: 0.7
            height: 0.7
            depth: 0.7
          material:
            color: "#3399FF"
            usePbr: true
            roughness: 0.34
            metalness: 0.58
            emissive: "#3399FF"
            emissiveIntensity: 0.5
          physics:
            kinematic: true
            bodyType: dynamic
            vz: 10
            lifetime: 8
            destroyOutOfBounds: true
            bounds:
              minX: -10
              maxX: 10
              minY: -2
              maxY: 10
              minZ: -60
              maxZ: 6
          collision:
            collidable: true
            collisionGroups:
            - blocks-blue
            collidesWith:
            - saber-right
            - miss-zone
            onCollision: sliced
          actions:
            sliced:
              destroy: true
        offset:
          x: 0.8
          y: 0
          z: 0
    spawn_red_low:
      sequence:
      - set_lane_low
      - spawn_red
      - set_lane_mid
    spawn_red_mid:
      sequence:
      - spawn_red
    spawn_red_high:
      sequence:
      - set_lane_high
      - spawn_red
      - set_lane_mid
    spawn_blue_low:
      sequence:
      - set_lane_low
      - spawn_blue
      - set_lane_mid
    spawn_blue_mid:
      sequence:
      - spawn_blue
    spawn_blue_high:
      sequence:
      - set_lane_high
      - spawn_blue
      - set_lane_mid
    spawn_double_low:
      sequence:
      - spawn_red_low
      - spawn_blue_low
    spawn_double_mid:
      sequence:
      - spawn_red_mid
      - spawn_blue_mid
    spawn_double_high:
      sequence:
      - spawn_red_high
      - spawn_blue_high
    spawn_random:
      randomPick:
      - spawn_red_low
      - spawn_red_mid
      - spawn_red_high
      - spawn_blue_low
      - spawn_blue_mid
      - spawn_blue_high
    spawn_double_random:
      randomPick:
      - spawn_double_low
      - spawn_double_mid
      - spawn_double_high
  callbacks:
    onBeat: spawn_random
    onDownbeat: spawn_double_random
domLayer:
- id: score-display
  context: dom
  type: div
  position:
    x: 20
    y: 15
  properties:
    text: SCORE {{ @vm.score }}
  style:
    color: "#FFFFFF"
    fontSize: 28
    fontFamily: monospace
    fontWeight: bold
- id: combo-display
  context: dom
  type: div
  position:
    x: 20
    y: 50
  properties:
    text: COMBO x{{ @vm.combo }}
  style:
    color: "#FFD700"
    fontSize: 18
    fontFamily: monospace
- id: missed-display
  context: dom
  type: div
  position:
    x: 20
    y: 74
  properties:
    text: MISSED {{ @vm.missed }}
  style:
    color: "#FF8A80"
    fontSize: 16
    fontFamily: monospace
- id: controls
  context: dom
  type: div
  position:
    x: 20
    y: 330
  properties:
    text: WASD left saber | ARROWS right saber | downbeat = doubles
  style:
    color: rgba(255,255,255,0.5)
    fontSize: 13
    fontFamily: monospace
